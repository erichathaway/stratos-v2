<?xml version="1.0" encoding="UTF-8"?>
<!--
  Big E Sessions — Rounded chip REDESIGNED per user spec
  Spec: 320×320, rx=56. Obsidian + amber edge.
  Layout change: "bigE" wordmark CENTERED at TOP, equalizer mountain CENTERED below.
  At sizes <80px the wordmark drops out (use D-mini-bars-only.svg).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" role="img" aria-label="Big E Sessions">
  <defs>
    <linearGradient id="beObs" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0E0703"/>
      <stop offset="100%" stop-color="#040201"/>
    </linearGradient>
    <linearGradient id="beEdge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="beGlass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.10"/>
      <stop offset="40%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect x="40" y="40" width="240" height="240" rx="56" fill="url(#beObs)" stroke="url(#beEdge)" stroke-width="1.5"/>
  <rect x="40" y="40" width="240" height="240" rx="56" fill="url(#beGlass)"/>

  <!-- "bigE" wordmark CENTERED at TOP. Single text, "big" white + "E" amber larger -->
  <text x="160" y="135" text-anchor="middle"
        font-family="Inter, system-ui, sans-serif"
        font-weight="900" letter-spacing="-2.5">
    <tspan fill="#FFFFFF" font-size="50">big</tspan><tspan fill="#F59E0B" font-size="68">E</tspan>
  </text>

  <!-- Mountain equalizer CENTERED below.
       13 bars × 12px wide × 13 = 156px wide. Start x = 160 − 78 = 82. Baseline y = 248. -->
  <g fill="#F59E0B">
    <rect x="82"  y="232" width="8" height="16"  rx="1"/>
    <rect x="94"  y="222" width="8" height="26"  rx="1"/>
    <rect x="106" y="210" width="8" height="38"  rx="1"/>
    <rect x="118" y="196" width="8" height="52"  rx="1"/>
    <rect x="130" y="182" width="8" height="66"  rx="1"/>
    <rect x="142" y="170" width="8" height="78"  rx="1"/>
    <rect x="154" y="164" width="8" height="84"  rx="1"/>
    <rect x="166" y="170" width="8" height="78"  rx="1"/>
    <rect x="178" y="182" width="8" height="66"  rx="1"/>
    <rect x="190" y="196" width="8" height="52"  rx="1"/>
    <rect x="202" y="210" width="8" height="38"  rx="1"/>
    <rect x="214" y="222" width="8" height="26"  rx="1"/>
    <rect x="226" y="232" width="8" height="16"  rx="1"/>
  </g>
</svg>
