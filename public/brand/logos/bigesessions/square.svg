<?xml version="1.0" encoding="UTF-8"?>
<!--
  Big E Sessions — Edge-to-edge square (text above, mountain below, centered)
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" role="img" aria-label="Big E Sessions">
  <defs>
    <linearGradient id="besObs" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0E0703"/>
      <stop offset="100%" stop-color="#040201"/>
    </linearGradient>
    <linearGradient id="besEdge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="besGlass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.10"/>
      <stop offset="40%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect x="0.75" y="0.75" width="318.5" height="318.5" fill="url(#besObs)" stroke="url(#besEdge)" stroke-width="1.5"/>
  <rect x="0.75" y="0.75" width="318.5" height="318.5" fill="url(#besGlass)"/>
  <text x="160" y="115" text-anchor="middle"
        font-family="Inter, system-ui, sans-serif"
        font-weight="900" letter-spacing="-2.5">
    <tspan fill="#FFFFFF" font-size="62">big</tspan><tspan fill="#F59E0B" font-size="84">E</tspan>
  </text>
  <!-- Larger mountain bars filling more of the edge-to-edge space -->
  <g fill="#F59E0B">
    <rect x="50"  y="252" width="12" height="22"  rx="2"/>
    <rect x="68"  y="240" width="12" height="34"  rx="2"/>
    <rect x="86"  y="226" width="12" height="48"  rx="2"/>
    <rect x="104" y="208" width="12" height="66"  rx="2"/>
    <rect x="122" y="190" width="12" height="84"  rx="2"/>
    <rect x="140" y="174" width="12" height="100" rx="2"/>
    <rect x="158" y="166" width="12" height="108" rx="2"/>
    <rect x="176" y="174" width="12" height="100" rx="2"/>
    <rect x="194" y="190" width="12" height="84"  rx="2"/>
    <rect x="212" y="208" width="12" height="66"  rx="2"/>
    <rect x="230" y="226" width="12" height="48"  rx="2"/>
    <rect x="248" y="240" width="12" height="34"  rx="2"/>
    <rect x="266" y="252" width="12" height="22"  rx="2"/>
  </g>
</svg>
