<?xml version="1.0" encoding="UTF-8"?>
<!--
  CommandOS — favicon variant (mini, <64px optimized).
  Concept: team coordination. Three operator silhouettes arranged 120°
  apart around a central emerald pulse, signaling coordinated command
  across distributed agents/humans. Replaces the earlier chevron/terminal
  mark (which read too close to Eric Hathaway's compass triangle at
  favicon size).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" role="img" aria-label="CommandOS">
  <defs>
    <linearGradient id="cmdFavObs" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A1A14"/>
      <stop offset="100%" stop-color="#02080A"/>
    </linearGradient>
    <linearGradient id="cmdFavEdge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <radialGradient id="cmdFavPulse" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6EE7B7"/>
      <stop offset="60%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#065F46"/>
    </radialGradient>
  </defs>

  <!-- Full-bleed chip frame -->
  <rect x="8" y="8" width="304" height="304" rx="56" fill="url(#cmdFavObs)" stroke="url(#cmdFavEdge)" stroke-width="6"/>

  <!-- Coordination ring connecting the three operators -->
  <circle cx="160" cy="160" r="78" fill="none" stroke="#10B981" stroke-width="3" opacity="0.35"/>

  <!-- Central pulse (command hub) -->
  <circle cx="160" cy="160" r="20" fill="url(#cmdFavPulse)"/>
  <circle cx="160" cy="160" r="9" fill="#02080A"/>

  <!--
    Three operator figures at 90° (top), 210° (bottom-left), 330° (bottom-right).
    Each figure: round head + rounded-shoulder body, scaled to read at 16px.
  -->

  <!-- Top operator (12 o'clock): head at (160, 62), body below -->
  <g fill="#34D399">
    <circle cx="160" cy="62" r="22"/>
    <path d="M 128 120 Q 128 96 160 96 Q 192 96 192 120 L 192 132 Q 160 124 128 132 Z"/>
  </g>

  <!-- Bottom-left operator (7:30 o'clock): rotated ~-150° -->
  <g fill="#34D399" transform="rotate(-120 160 160)">
    <circle cx="160" cy="62" r="22"/>
    <path d="M 128 120 Q 128 96 160 96 Q 192 96 192 120 L 192 132 Q 160 124 128 132 Z"/>
  </g>

  <!-- Bottom-right operator (4:30 o'clock): rotated ~+150° -->
  <g fill="#34D399" transform="rotate(120 160 160)">
    <circle cx="160" cy="62" r="22"/>
    <path d="M 128 120 Q 128 96 160 96 Q 192 96 192 120 L 192 132 Q 160 124 128 132 Z"/>
  </g>
</svg>
