<?xml version="1.0" encoding="UTF-8"?>
<!--
  CommandOS — Edge-to-edge square (uses Option A simple chevron, scaled larger)
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" role="img" aria-label="CommandOS">
  <defs>
    <linearGradient id="cmdSObs" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A1A14"/>
      <stop offset="100%" stop-color="#02080A"/>
    </linearGradient>
    <linearGradient id="cmdSEdge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="cmdSGlass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.10"/>
      <stop offset="40%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect x="0.75" y="0.75" width="318.5" height="318.5" fill="url(#cmdSObs)" stroke="url(#cmdSEdge)" stroke-width="1.5"/>
  <rect x="0.75" y="0.75" width="318.5" height="318.5" fill="url(#cmdSGlass)"/>
  <!-- Larger chevron for edge-to-edge -->
  <path d="M 90 75 L 180 160 L 90 245" stroke="#10B981" stroke-width="26" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <rect x="200" y="146" width="56" height="28" rx="7" fill="#10B981"/>
</svg>
