<?xml version="1.0" encoding="UTF-8"?>
<!--
  CommandOS — Wordmark (mini chevron chip + "CommandOS" text)
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 80" role="img" aria-label="CommandOS">
  <defs>
    <linearGradient id="cmdwObs" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A1A14"/>
      <stop offset="100%" stop-color="#02080A"/>
    </linearGradient>
    <linearGradient id="cmdwEdge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="cmdwGlass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.10"/>
      <stop offset="40%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Mini chip 56x56 -->
  <rect x="12" y="12" width="56" height="56" rx="12" fill="url(#cmdwObs)" stroke="url(#cmdwEdge)" stroke-width="1"/>
  <rect x="12" y="12" width="56" height="56" rx="12" fill="url(#cmdwGlass)"/>
  <!-- Chevron + terminal block scaled inside chip -->
  <path d="M 27 27 L 42 40 L 27 53" stroke="#10B981" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <rect x="46" y="36" width="10" height="6" rx="1.5" fill="#10B981"/>
  <!-- Wordmark -->
  <text x="86" y="55"
        font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="42"
        letter-spacing="-1" fill="#10B981">Command<tspan fill="#FFFFFF">OS</tspan></text>
</svg>
