<?xml version="1.0" encoding="UTF-8"?>
<!--
  COO Playbook — favicon variant. Chip already reads well at small sizes
  (thick 22px bars), this bleeds to edges for extra weight.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" role="img" aria-label="COO Playbook">
  <defs>
    <linearGradient id="cpFavObs" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F1117"/>
      <stop offset="100%" stop-color="#050709"/>
    </linearGradient>
    <linearGradient id="cpFavEdge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#94A3B8"/>
      <stop offset="100%" stop-color="#64748B"/>
    </linearGradient>
    <linearGradient id="cpFavBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>
  <rect x="8" y="8" width="304" height="304" rx="56" fill="url(#cpFavObs)" stroke="url(#cpFavEdge)" stroke-width="6"/>
  <rect x="48"  y="80"  width="180" height="28" rx="14" fill="url(#cpFavBar)" opacity="0.92"/>
  <rect x="48"  y="126" width="132" height="28" rx="14" fill="url(#cpFavBar)" opacity="0.68"/>
  <rect x="48"  y="172" width="180" height="28" rx="14" fill="url(#cpFavBar)" opacity="0.92"/>
  <rect x="48"  y="218" width="100" height="28" rx="14" fill="url(#cpFavBar)" opacity="0.46"/>
  <circle cx="256" cy="94" r="18" fill="#EC4899"/>
</svg>
