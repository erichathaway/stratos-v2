<?xml version="1.0" encoding="UTF-8"?>
<!--
  COO Playbook — Edge-to-edge square (same alignment-bars design as chip)
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" role="img" aria-label="COO Playbook">
  <defs>
    <linearGradient id="cpsObs" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F1117"/>
      <stop offset="100%" stop-color="#050709"/>
    </linearGradient>
    <linearGradient id="cpsEdge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#94A3B8"/>
      <stop offset="100%" stop-color="#64748B"/>
    </linearGradient>
    <linearGradient id="cpsGlass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.10"/>
      <stop offset="40%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="cpsBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>
  <rect x="0.75" y="0.75" width="318.5" height="318.5" fill="url(#cpsObs)" stroke="url(#cpsEdge)" stroke-width="1.5"/>
  <rect x="0.75" y="0.75" width="318.5" height="318.5" fill="url(#cpsGlass)"/>
  <!-- Larger alignment bars for edge-to-edge -->
  <rect x="50" y="80"  width="200" height="28" rx="14" fill="url(#cpsBar)" opacity="0.92"/>
  <rect x="50" y="128" width="150" height="28" rx="14" fill="url(#cpsBar)" opacity="0.68"/>
  <rect x="50" y="176" width="200" height="28" rx="14" fill="url(#cpsBar)" opacity="0.92"/>
  <rect x="50" y="224" width="115" height="28" rx="14" fill="url(#cpsBar)" opacity="0.46"/>
  <circle cx="270" cy="94" r="18" fill="#EC4899"/>
</svg>
