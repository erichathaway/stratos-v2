<?xml version="1.0" encoding="UTF-8"?>
<!--
  Eric Hathaway — Personal Brand Logo (rounded chip)
  ───────────────────────────────────────────────────────────────────────────
  Spec: 320 × 320, chip-style format matching the family system
        (level9os.svg, linkupos.svg, lucidorg.svg, bigesessions.svg).
  Concept: Compass rose with North emphasized in white = navigator,
           leader, global. Amber/silver palette per established personal
           brand direction. Refined from EH-concepts #07.
  Use: LinkedIn personal page, About link, personal email signature, etc.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" role="img" aria-label="Eric Hathaway">
  <defs>
    <!-- Frame -->
    <linearGradient id="ehObsidian" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#1A1208"/>
      <stop offset="100%" stop-color="#08040A"/>
    </linearGradient>
    <linearGradient id="ehAmberEdge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#FBBF24"/>
      <stop offset="55%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#9CA3AF"/>
    </linearGradient>
    <linearGradient id="ehGlassHi" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#FFFFFF" stop-opacity="0.12"/>
      <stop offset="40%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <!-- Compass needles -->
    <linearGradient id="ehNorthNeedle" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E5E7EB"/>
    </linearGradient>
    <linearGradient id="ehAmberNeedle" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>

  <!-- Frame: obsidian + amber-silver edge + glass highlight -->
  <rect x="40" y="40" width="240" height="240" rx="56" fill="url(#ehObsidian)" stroke="url(#ehAmberEdge)" stroke-width="1.5"/>
  <rect x="40" y="40" width="240" height="240" rx="56" fill="url(#ehGlassHi)"/>

  <!-- ═══════════ COMPASS ROSE ═══════════ -->
  <!-- Center at (160, 160). Compass radius = 84 -->
  <g>
    <!-- Outer compass ring (subtle) -->
    <circle cx="160" cy="160" r="84" fill="none" stroke="#F59E0B" stroke-width="1.2" opacity="0.4"/>
    <circle cx="160" cy="160" r="78" fill="none" stroke="#F59E0B" stroke-width="0.8" opacity="0.25"/>

    <!-- Cardinal tick marks (8 small ticks around the ring) -->
    <g stroke="#F59E0B" stroke-width="1.5" opacity="0.6">
      <!-- N/S/E/W ticks (longer) -->
      <line x1="160" y1="68"  x2="160" y2="78"/>
      <line x1="160" y1="242" x2="160" y2="252"/>
      <line x1="68"  y1="160" x2="78"  y2="160"/>
      <line x1="242" y1="160" x2="252" y2="160"/>
      <!-- NE/NW/SE/SW ticks (shorter) -->
      <line x1="225" y1="95"  x2="218" y2="102" opacity="0.5"/>
      <line x1="95"  y1="95"  x2="102" y2="102" opacity="0.5"/>
      <line x1="225" y1="225" x2="218" y2="218" opacity="0.5"/>
      <line x1="95"  y1="225" x2="102" y2="218" opacity="0.5"/>
    </g>

    <!-- ─── Diagonal needles (NE/SW, NW/SE) — subtle amber, behind cardinal ─── -->
    <g opacity="0.5">
      <!-- NE needle -->
      <polygon points="222,98 158,162 162,158" fill="#F59E0B"/>
      <!-- SW needle -->
      <polygon points="98,222 162,158 158,162" fill="#F59E0B"/>
      <!-- NW needle -->
      <polygon points="98,98 158,158 162,162" fill="#F59E0B"/>
      <!-- SE needle -->
      <polygon points="222,222 162,162 158,158" fill="#F59E0B"/>
    </g>

    <!-- ─── E/W needles (amber, full opacity) ─── -->
    <!-- East -->
    <polygon points="234,160 160,154 160,166" fill="url(#ehAmberNeedle)" stroke="rgba(251,191,36,0.4)" stroke-width="0.5"/>
    <!-- West -->
    <polygon points="86,160 160,154 160,166" fill="url(#ehAmberNeedle)" opacity="0.85"/>

    <!-- ─── S needle (amber, half tone) ─── -->
    <polygon points="160,234 152,160 168,160" fill="url(#ehAmberNeedle)" opacity="0.7"/>

    <!-- ─── N needle (white, dominant — points to North = leadership/direction) ─── -->
    <polygon points="160,86 150,160 170,160" fill="url(#ehNorthNeedle)" stroke="rgba(255,255,255,0.3)" stroke-width="0.5"/>

    <!-- N letter marker above needle -->
    <text x="160" y="78" text-anchor="middle"
          font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="13"
          fill="#FFFFFF" letter-spacing="2">N</text>

    <!-- Center hub (white, prominent) -->
    <circle cx="160" cy="160" r="9" fill="#FFFFFF"/>
    <circle cx="160" cy="160" r="5" fill="#F59E0B"/>
  </g>
</svg>
