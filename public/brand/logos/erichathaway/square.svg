<?xml version="1.0" encoding="UTF-8"?>
<!--
  Eric Hathaway — Personal Brand Logo (sharp square variant)
  ───────────────────────────────────────────────────────────────────────────
  Spec: 320 × 320, edge-to-edge sharp square matching the LucidORG square
        treatment. Same compass rose, larger scale.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" role="img" aria-label="Eric Hathaway">
  <defs>
    <linearGradient id="ehSqObsidian" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#1A1208"/>
      <stop offset="100%" stop-color="#08040A"/>
    </linearGradient>
    <linearGradient id="ehSqEdge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#FBBF24"/>
      <stop offset="55%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#9CA3AF"/>
    </linearGradient>
    <linearGradient id="ehSqGlass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#FFFFFF" stop-opacity="0.10"/>
      <stop offset="40%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ehSqNorth" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E5E7EB"/>
    </linearGradient>
    <linearGradient id="ehSqAmber" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>

  <!-- Edge-to-edge frame with same hairline border -->
  <rect x="0.75" y="0.75" width="318.5" height="318.5" fill="url(#ehSqObsidian)" stroke="url(#ehSqEdge)" stroke-width="1.5"/>
  <rect x="0.75" y="0.75" width="318.5" height="318.5" fill="url(#ehSqGlass)"/>

  <!-- Compass rose, larger scale (radius 120 vs 84 in chip) -->
  <g>
    <!-- Outer rings -->
    <circle cx="160" cy="160" r="120" fill="none" stroke="#F59E0B" stroke-width="1.5" opacity="0.4"/>
    <circle cx="160" cy="160" r="112" fill="none" stroke="#F59E0B" stroke-width="1" opacity="0.25"/>

    <!-- Cardinal tick marks -->
    <g stroke="#F59E0B" stroke-width="2" opacity="0.6">
      <line x1="160" y1="28"  x2="160" y2="40"/>
      <line x1="160" y1="280" x2="160" y2="292"/>
      <line x1="28"  y1="160" x2="40"  y2="160"/>
      <line x1="280" y1="160" x2="292" y2="160"/>
      <line x1="253" y1="67"  x2="246" y2="74" opacity="0.5"/>
      <line x1="67"  y1="67"  x2="74"  y2="74" opacity="0.5"/>
      <line x1="253" y1="253" x2="246" y2="246" opacity="0.5"/>
      <line x1="67"  y1="253" x2="74"  y2="246" opacity="0.5"/>
    </g>

    <!-- Diagonal needles (subtle) -->
    <g opacity="0.5">
      <polygon points="250,70 158,162 162,158" fill="#F59E0B"/>
      <polygon points="70,250 162,158 158,162" fill="#F59E0B"/>
      <polygon points="70,70 158,158 162,162" fill="#F59E0B"/>
      <polygon points="250,250 162,162 158,158" fill="#F59E0B"/>
    </g>

    <!-- E/W needles -->
    <polygon points="270,160 160,152 160,168" fill="url(#ehSqAmber)" stroke="rgba(251,191,36,0.4)" stroke-width="0.5"/>
    <polygon points="50,160 160,152 160,168" fill="url(#ehSqAmber)" opacity="0.85"/>

    <!-- S needle -->
    <polygon points="160,270 150,160 170,160" fill="url(#ehSqAmber)" opacity="0.7"/>

    <!-- N needle (dominant white) -->
    <polygon points="160,50 148,160 172,160" fill="url(#ehSqNorth)" stroke="rgba(255,255,255,0.3)" stroke-width="0.5"/>

    <!-- N letter marker -->
    <text x="160" y="42" text-anchor="middle"
          font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="16"
          fill="#FFFFFF" letter-spacing="2">N</text>

    <!-- Center hub -->
    <circle cx="160" cy="160" r="12" fill="#FFFFFF"/>
    <circle cx="160" cy="160" r="6" fill="#F59E0B"/>
  </g>
</svg>
