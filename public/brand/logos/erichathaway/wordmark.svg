<?xml version="1.0" encoding="UTF-8"?>
<!--
  Eric Hathaway — Wordmark (mini compass chip + "Eric Hathaway" text)
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 80" role="img" aria-label="Eric Hathaway">
  <defs>
    <linearGradient id="ehwObs" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1208"/>
      <stop offset="100%" stop-color="#08040A"/>
    </linearGradient>
    <linearGradient id="ehwEdge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="ehwGlass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.10"/>
      <stop offset="40%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ehwNorth" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E5E7EB"/>
    </linearGradient>
  </defs>
  <!-- Mini chip 56x56 -->
  <rect x="12" y="12" width="56" height="56" rx="12" fill="url(#ehwObs)" stroke="url(#ehwEdge)" stroke-width="1"/>
  <rect x="12" y="12" width="56" height="56" rx="12" fill="url(#ehwGlass)"/>
  <!-- Compass mark, scaled to fit -->
  <g transform="translate(40,40)">
    <circle cx="0" cy="0" r="18" fill="none" stroke="#F59E0B" stroke-width="0.6" opacity="0.4"/>
    <polygon points="14,0 0,-3 0,3" fill="#F59E0B" opacity="0.85"/>
    <polygon points="-14,0 0,-3 0,3" fill="#F59E0B" opacity="0.7"/>
    <polygon points="0,14 -2,0 2,0" fill="#F59E0B" opacity="0.6"/>
    <polygon points="0,-18 -3,0 3,0" fill="url(#ehwNorth)"/>
    <circle cx="0" cy="0" r="2.5" fill="#FFFFFF"/>
    <circle cx="0" cy="0" r="1" fill="#F59E0B"/>
  </g>
  <!-- Wordmark -->
  <text x="86" y="55"
        font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="40"
        letter-spacing="-1" fill="#F59E0B">Eric <tspan fill="#FFFFFF">Hathaway</tspan></text>
</svg>
