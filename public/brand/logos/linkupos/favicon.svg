<?xml version="1.0" encoding="UTF-8"?>
<!--
  LinkupOS — favicon variant (mini, <64px optimized).
  Same inverted anchor mark as chip.svg but bled to chip edges and
  with thicker stroke for 16-32px readability.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" role="img" aria-label="LinkupOS">
  <defs>
    <linearGradient id="lpFavObs" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1208"/>
      <stop offset="100%" stop-color="#08040A"/>
    </linearGradient>
    <linearGradient id="lpFavEdge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>
  <rect x="8" y="8" width="304" height="304" rx="56" fill="url(#lpFavObs)" stroke="url(#lpFavEdge)" stroke-width="6"/>
  <!-- Inverted anchor, scaled up and thickened -->
  <g transform="translate(160,160) scale(9) rotate(180) translate(-12,-12)" fill="none" stroke="#F59E0B" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 6v16"/>
    <path d="m19 13 2-1a9 9 0 0 1-18 0l2 1"/>
    <path d="M9 11h6"/>
    <circle cx="12" cy="4" r="2"/>
  </g>
</svg>
