    <path fill="#06B6D4" d="M53.39,149.45c21.89,12.6,43.78,25.21,65.66,37.81l.03.05.03-.02.22.13.22-.38,42.96-24.73,18.45-32.27-61.85,35.61-68.54-39.46-.1.16v21.42c.97.56,1.94,1.12,2.91,1.68Z"/>
    <path fill="#0EA5E9" d="M24.91,86.68c0,25.21,0,50.41,0,75.62l-.03.05.03.02v.25s.44,0,.44,0l42.96,24.73,37.25-.19-61.85-35.61v-78.93s-.19,0-.19,0l-18.6,10.71c0,1.12,0,2.23,0,3.35Z"/>
    <path fill="#8B5CF6" d="M65.95,30.88C44.06,43.48,22.17,56.08.28,68.69h-.06s0,.03,0,.03l-.22.13.22.38v49.47s18.79,32.07,18.79,32.07v-71.23s68.54-39.46,68.54-39.46l-.1-.16-18.6-10.71c-.97.56-1.94,1.12-2.91,1.68Z"/>
  </g>
</svg>
