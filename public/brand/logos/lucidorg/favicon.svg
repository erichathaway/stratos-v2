<?xml version="1.0" encoding="UTF-8"?>
<!--
  LucidORG — favicon variant (mini, <64px optimized).
  Uses the canonical 6-path multi-colored mark from chip.svg (cyan / sky /
  violet, 180° rotational symmetry — same Asset 5.svg paths), scaled up
  and centered on a full-bleed chip frame for 16-32px readability.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" role="img" aria-label="LucidORG">
  <defs>
    <linearGradient id="loFavObs" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#0A1A2E"/>
      <stop offset="100%" stop-color="#020812"/>
    </linearGradient>
    <linearGradient id="loFavEdge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#0EA5E9"/>
      <stop offset="55%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="loFavGlass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#FFFFFF" stop-opacity="0.10"/>
      <stop offset="40%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Full-bleed chip frame -->
  <rect x="8" y="8" width="304" height="304" rx="56" fill="url(#loFavObs)" stroke="url(#loFavEdge)" stroke-width="6"/>
  <rect x="8" y="8" width="304" height="304" rx="56" fill="url(#loFavGlass)"/>

  <!--
    Canonical 6-path hex-radial mark (from Asset 5.svg via chip.svg), scaled
    1.36× (vs chip's 0.958×) to ~80% of favicon canvas. Translate offsets
    computed from source artwork center (94, 93.7) to land on chip center (160, 160).
    Per-path fills: cyan / sky / violet × 2, 180° rotational symmetry. Unchanged.
  -->
  <g transform="translate(32.16, 32.57) scale(1.36)" opacity="0.96">
    <path fill="#06B6D4" d="M134.05,37.97C112.17,25.37,90.28,12.76,68.39.16l-.03-.05-.03.02-.22-.13-.22.38L24.93,25.11,6.48,57.38l61.85-35.61,68.54,39.46.1-.16v-21.42c-.97-.56-1.94-1.12-2.91-1.68Z"/>
    <path fill="#0EA5E9" d="M162.55,100.82c0-25.21,0-50.41,0-75.62l.03-.05-.03-.02v-.25s-.44,0-.44,0L119.15.15l-37.25.19,61.85,35.61v78.93s.19,0,.19,0l18.6-10.71c0-1.12,0-2.23,0-3.35Z"/>
