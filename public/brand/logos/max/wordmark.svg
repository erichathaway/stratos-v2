<?xml version="1.0" encoding="UTF-8"?>
<!-- MAX — wordmark (mini chip + "MAX") -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 80" role="img" aria-label="MAX">
  <defs>
    <linearGradient id="maxWmFuchsia" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#F472B6"/>
      <stop offset="55%" stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#BE185D"/>
    </linearGradient>
    <linearGradient id="maxWmObs" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#1A0814"/>
      <stop offset="100%" stop-color="#060208"/>
    </linearGradient>
    <linearGradient id="maxWmGlass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#FFFFFF" stop-opacity="0.12"/>
      <stop offset="40%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Mini chip 56x56 -->
  <rect x="12" y="12" width="56" height="56" rx="12" fill="url(#maxWmObs)" stroke="url(#maxWmFuchsia)" stroke-width="1"/>
  <rect x="12" y="12" width="56" height="56" rx="12" fill="url(#maxWmGlass)"/>
  <text x="40" y="52" text-anchor="middle" dominant-baseline="alphabetic"
        font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="42"
        fill="#FFFFFF" transform="rotate(-14 40 50)" style="letter-spacing:-0.06em">M</text>

  <!-- Wordmark -->
  <text x="86" y="55"
        font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="42"
        letter-spacing="4" fill="url(#maxWmFuchsia)">MAX</text>
</svg>
