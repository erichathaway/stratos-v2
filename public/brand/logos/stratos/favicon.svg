<?xml version="1.0" encoding="UTF-8"?>
<!--
  StratOS — favicon variant (mini, <64px optimized).
  Concept: strategic radar. Single cyan North needle + radar rings +
  cardinal tick marks + glowing hub. The radar rings and tick marks
  differentiate from Eric Hathaway's plainer compass-needle mark.
  Simplified from the full 512-canvas chip (which has blur filters and
  polygons that collapse at small sizes).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" role="img" aria-label="StratOS">
  <defs>
    <linearGradient id="stFavObs" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070D1A"/>
      <stop offset="100%" stop-color="#020509"/>
    </linearGradient>
    <linearGradient id="stFavEdge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#67E8F9"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <radialGradient id="stFavHub" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#67E8F9"/>
      <stop offset="60%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </radialGradient>
  </defs>

  <!-- Full-bleed chip frame -->
  <rect x="8" y="8" width="304" height="304" rx="56" fill="url(#stFavObs)" stroke="url(#stFavEdge)" stroke-width="6"/>

  <!-- Radar rings -->
  <circle cx="160" cy="160" r="112" fill="none" stroke="#00E5FF" stroke-width="2" opacity="0.25"/>
  <circle cx="160" cy="160" r="80" fill="none" stroke="#00E5FF" stroke-width="2" opacity="0.35"/>

  <!-- Cardinal tick marks (N/E/S/W) -->
  <g stroke="#00E5FF" stroke-width="4" stroke-linecap="round" opacity="0.6">
    <line x1="160" y1="44" x2="160" y2="64"/>
    <line x1="276" y1="160" x2="256" y2="160"/>
    <line x1="160" y1="276" x2="160" y2="256"/>
    <line x1="44" y1="160" x2="64" y2="160"/>
  </g>

  <!-- Dominant cyan North needle (strategic direction) -->
  <polygon points="160,72 138,160 182,160" fill="#00E5FF"/>

  <!-- Faded South counter-needle -->
  <polygon points="160,248 146,160 174,160" fill="#0E7490" opacity="0.7"/>

  <!-- Center hub -->
  <circle cx="160" cy="160" r="22" fill="url(#stFavHub)"/>
  <circle cx="160" cy="160" r="10" fill="#070D1A"/>
  <circle cx="160" cy="160" r="5" fill="#67E8F9"/>
</svg>
