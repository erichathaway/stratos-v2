<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StratOS Report</title>
<link rel="icon" type="image/svg+xml" href="/stratos-icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
:root {
  --bg-page:#08080e; --bg-surface:#0f1118; --bg-surface-2:#141820; --bg-surface-3:#1a1f2c;
  --border:#1c2232; --border-hover:#28305a;
  --blue:#5b9cf6; --amber:#f0a030; --teal:#26c8b0; --purple:#9b78f0; --red:#e86060; --green:#38cc70;
  --text-primary:#edf1fa; --text-secondary:#7a8aa8; --text-muted:#404e68;
  --font-display:'Sora',system-ui,sans-serif; --font-body:'Inter',system-ui,sans-serif; --font-mono:'DM Mono',monospace;
  --shadow-sm:0 2px 8px rgba(0,0,0,.55),0 0 0 1px rgba(255,255,255,.027);
  --shadow-md:0 4px 20px rgba(0,0,0,.65),0 0 0 1px rgba(255,255,255,.037);
  --r-sm:5px; --r-md:8px; --r-lg:12px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg-page);color:var(--text-primary);font-family:var(--font-body);font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased}

/* ── Layout ─── */
.report{max-width:900px;margin:0 auto;padding:40px 48px}

/* ── Header ─── */
.rpt-header{display:flex;align-items:center;justify-content:space-between;padding-bottom:20px;border-bottom:1px solid var(--border);margin-bottom:28px}
.rpt-brand{font-family:var(--font-display);font-size:20px;font-weight:700;letter-spacing:-.5px}
.rpt-brand span{color:var(--blue)}
.rpt-meta{display:flex;gap:14px;align-items:center;font-family:var(--font-mono);font-size:11px;color:var(--text-muted)}
.rpt-badge{padding:3px 10px;border-radius:var(--r-sm);font-weight:600;font-size:10px;letter-spacing:.5px;text-transform:uppercase}
.badge-blue{background:color-mix(in srgb,var(--blue) 15%,transparent);color:var(--blue);border:1px solid color-mix(in srgb,var(--blue) 30%,transparent)}
.badge-teal{background:color-mix(in srgb,var(--teal) 15%,transparent);color:var(--teal);border:1px solid color-mix(in srgb,var(--teal) 30%,transparent)}

/* ── Toolbar ─── */
.rpt-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:28px;flex-wrap:wrap}
.rpt-view-btn{padding:6px 14px;border-radius:var(--r-sm);border:1px solid var(--border);background:transparent;color:var(--text-secondary);font-family:var(--font-mono);font-size:11px;font-weight:600;cursor:pointer;transition:all .2s;letter-spacing:.3px}
.rpt-view-btn:hover{border-color:var(--border-hover);color:var(--text-primary)}
.rpt-view-btn.active{border-color:var(--blue);color:var(--blue);background:color-mix(in srgb,var(--blue) 8%,transparent)}
.rpt-export-btn{margin-left:auto;padding:6px 16px;border-radius:var(--r-sm);border:1px solid color-mix(in srgb,var(--teal) 40%,transparent);background:color-mix(in srgb,var(--teal) 10%,transparent);color:var(--teal);font-family:var(--font-mono);font-size:11px;font-weight:700;cursor:pointer;transition:all .2s}
.rpt-export-btn:hover{background:color-mix(in srgb,var(--teal) 18%,transparent);border-color:var(--teal)}

/* ── Page marker ─── */
.page-break{page-break-before:always;break-before:page;padding-top:8px}
.page-label{font-family:var(--font-mono);font-size:9px;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:16px;padding-bottom:6px;border-bottom:1px solid color-mix(in srgb,var(--border) 50%,transparent)}

/* ── Verdict hero ─── */
.rpt-verdict{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:28px 32px;margin-bottom:24px;position:relative;overflow:hidden}
.rpt-verdict::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--teal),var(--blue),var(--purple))}
.rpt-v-label{font-family:var(--font-mono);font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px}
.rpt-v-word{font-family:var(--font-display);font-size:30px;font-weight:700;letter-spacing:-1px;margin-bottom:4px}
.rpt-v-sub{font-size:14px;color:var(--text-secondary);margin-bottom:12px}
.rpt-q{font-size:13px;color:var(--text-secondary);line-height:1.7;padding:10px 14px;background:var(--bg-surface-2);border-radius:var(--r-md);margin-top:10px}
.rpt-q strong{color:var(--text-primary);font-weight:600}
.rpt-q-accent{border-left:3px solid var(--blue)}
.rpt-q-purple{border-left:3px solid var(--purple)}

/* ── Metrics ─── */
.rpt-metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:24px}
.rpt-m{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--r-md);padding:14px 16px;text-align:center}
.rpt-m-val{font-family:var(--font-display);font-size:24px;font-weight:700;letter-spacing:-.5px;margin-bottom:2px}
.rpt-m-label{font-family:var(--font-mono);font-size:9px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--text-muted)}

/* ── Section ─── */
.rpt-sec{margin-bottom:24px;page-break-inside:avoid}
.rpt-sec-head{display:flex;align-items:center;gap:8px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.rpt-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.rpt-sec-title{font-family:var(--font-display);font-size:15px;font-weight:700;letter-spacing:-.3px}

/* ── Card ─── */
.rpt-card{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--r-md);margin-bottom:10px;overflow:hidden;page-break-inside:avoid}
.rpt-card-h{padding:9px 16px;font-family:var(--font-mono);font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--text-secondary);background:var(--bg-surface-2);border-bottom:1px solid var(--border)}
.rpt-card-b{padding:14px 16px}

/* ── Items ─── */
.rpt-item{display:flex;gap:10px;padding:7px 0;border-bottom:1px solid color-mix(in srgb,var(--border) 50%,transparent);font-size:13px;line-height:1.6}
.rpt-item:last-child{border-bottom:none}
.rpt-icon{width:20px;height:20px;border-radius:var(--r-sm);display:grid;place-items:center;font-size:9px;font-weight:700;flex-shrink:0;margin-top:2px}
.ic-amber{background:color-mix(in srgb,var(--amber) 15%,transparent);color:var(--amber)}
.ic-red{background:color-mix(in srgb,var(--red) 15%,transparent);color:var(--red)}
.ic-teal{background:color-mix(in srgb,var(--teal) 15%,transparent);color:var(--teal)}
.ic-blue{background:color-mix(in srgb,var(--blue) 15%,transparent);color:var(--blue)}
.ic-purple{background:color-mix(in srgb,var(--purple) 15%,transparent);color:var(--purple)}
.ic-green{background:color-mix(in srgb,var(--green) 15%,transparent);color:var(--green)}

/* ── Table ─── */
.rpt-tbl{width:100%;border-collapse:collapse;font-size:12px}
.rpt-tbl th{text-align:left;padding:7px 10px;font-family:var(--font-mono);font-size:9px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--text-muted);border-bottom:1px solid var(--border)}
.rpt-tbl td{padding:7px 10px;border-bottom:1px solid color-mix(in srgb,var(--border) 50%,transparent);vertical-align:top}
.rpt-tbl tr:last-child td{border-bottom:none}

/* ── Vote bars ─── */
.v-row{display:flex;align-items:center;gap:8px;padding:5px 0}
.v-role{width:55px;font-family:var(--font-mono);font-size:10px;font-weight:600;color:var(--text-secondary)}
.v-track{flex:1;height:5px;background:var(--bg-surface-2);border-radius:3px;overflow:hidden}
.v-fill{height:100%;border-radius:3px}
.v-stance{width:75px;font-family:var(--font-mono);font-size:9px;font-weight:700;letter-spacing:.4px}
.v-conf{width:32px;text-align:right;font-family:var(--font-mono);font-size:11px;font-weight:600}

/* ── Links ─── */
.rpt-audio{display:inline-flex;align-items:center;gap:7px;padding:5px 12px;border-radius:var(--r-md);background:color-mix(in srgb,var(--teal) 10%,transparent);border:1px solid color-mix(in srgb,var(--teal) 30%,transparent);color:var(--teal);font-family:var(--font-mono);font-size:10px;font-weight:700;text-decoration:none;cursor:pointer;transition:all .2s;margin:3px 3px 3px 0}
.rpt-audio:hover{background:color-mix(in srgb,var(--teal) 18%,transparent);border-color:var(--teal)}
.rpt-audio-ic{width:16px;height:16px;border-radius:50%;background:color-mix(in srgb,var(--teal) 20%,transparent);border:1px solid color-mix(in srgb,var(--teal) 45%,transparent);display:grid;place-items:center;font-size:7px}
.rpt-doc{display:inline-flex;align-items:center;gap:7px;padding:5px 12px;border-radius:var(--r-md);background:color-mix(in srgb,var(--blue) 10%,transparent);border:1px solid color-mix(in srgb,var(--blue) 30%,transparent);color:var(--blue);font-family:var(--font-mono);font-size:10px;font-weight:700;text-decoration:none;transition:all .2s;margin:3px 3px 3px 0}
.rpt-doc:hover{background:color-mix(in srgb,var(--blue) 18%,transparent);border-color:var(--blue)}

/* ── Chip ─── */
.chip{display:inline-block;padding:2px 7px;border-radius:var(--r-sm);font-family:var(--font-mono);font-size:9px;font-weight:700;letter-spacing:.3px}
.ch-amber{background:color-mix(in srgb,var(--amber) 15%,transparent);color:var(--amber)}
.ch-red{background:color-mix(in srgb,var(--red) 15%,transparent);color:var(--red)}
.ch-teal{background:color-mix(in srgb,var(--teal) 15%,transparent);color:var(--teal)}
.ch-blue{background:color-mix(in srgb,var(--blue) 15%,transparent);color:var(--blue)}
.ch-green{background:color-mix(in srgb,var(--green) 15%,transparent);color:var(--green)}
.ch-purple{background:color-mix(in srgb,var(--purple) 15%,transparent);color:var(--purple)}

/* ── Grid ─── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}

/* ── Tier gate ─── */
.rpt-gate{background:var(--bg-surface);border:1px dashed var(--border);border-radius:var(--r-md);padding:20px;text-align:center;margin-bottom:10px}
.rpt-gate h4{font-family:var(--font-display);font-size:14px;font-weight:600;color:var(--text-secondary);margin-bottom:4px}
.rpt-gate p{font-size:11px;color:var(--text-muted)}
.rpt-gate a{display:inline-block;margin-top:10px;padding:5px 18px;border-radius:var(--r-sm);border:1px solid var(--blue);background:color-mix(in srgb,var(--blue) 12%,transparent);color:var(--blue);font-family:var(--font-mono);font-size:10px;font-weight:700;text-decoration:none}

/* ── Narrative block ─── */
.rpt-narrative{font-size:13px;line-height:1.8;color:var(--text-secondary)}
.rpt-narrative strong{color:var(--text-primary)}

/* ── Gov doc embed ─── */
.rpt-gov-hero{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:24px 28px;text-align:center;margin-bottom:16px}
.rpt-gov-hero h3{font-family:var(--font-display);font-size:18px;font-weight:700;margin-bottom:6px}
.rpt-gov-hero p{font-size:12px;color:var(--text-secondary);margin-bottom:14px}
.rpt-gov-btn{display:inline-flex;align-items:center;gap:8px;padding:10px 24px;border-radius:var(--r-md);border:1px solid var(--blue);background:color-mix(in srgb,var(--blue) 12%,transparent);color:var(--blue);font-family:var(--font-mono);font-size:12px;font-weight:700;text-decoration:none;transition:all .2s;margin:0 6px}
.rpt-gov-btn:hover{background:color-mix(in srgb,var(--blue) 22%,transparent)}
.rpt-gov-btn-pdf{border-color:var(--teal);color:var(--teal);background:color-mix(in srgb,var(--teal) 12%,transparent)}
.rpt-gov-btn-pdf:hover{background:color-mix(in srgb,var(--teal) 22%,transparent)}

/* ── Footer ─── */
.rpt-footer{margin-top:40px;padding-top:16px;border-top:1px solid var(--border);display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:9px;color:var(--text-muted)}

/* ── Loading ─── */
.rpt-loading{text-align:center;padding:80px 0;color:var(--text-muted);font-family:var(--font-mono);font-size:13px}
.rpt-spinner{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Color helpers ─── */
.c-blue{color:var(--blue)}.c-teal{color:var(--teal)}.c-amber{color:var(--amber)}.c-purple{color:var(--purple)}.c-red{color:var(--red)}.c-green{color:var(--green)}

/* ── Print ─── */
@media print{
  body{background:#fff;color:#1a1a1a;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .report{max-width:100%;padding:16px 20px}
  .rpt-toolbar{display:none!important}
  .rpt-card,.rpt-verdict,.rpt-m,.rpt-gov-hero{border-color:#ddd;break-inside:avoid}
  .rpt-sec{break-inside:avoid}
  .page-break{break-before:page}
}
/* PDF Export Light Mode */
.pdf-export-mode { background: #fff !important; color: #1a1a2e !important; }
.pdf-export-mode * { color: #1a1a2e !important; border-color: #ddd !important; }
.pdf-export-mode .rpt-header { background: #f8f9fa !important; border-bottom: 2px solid #0a0d14 !important; }
.pdf-export-mode .rpt-header * { color: #0a0d14 !important; }
.pdf-export-mode .rpt-logo-text { color: #0a0d14 !important; }
.pdf-export-mode .page-label { color: #0a0d14 !important; border-color: #0a0d14 !important; }
.pdf-export-mode .rpt-verdict-hero { background: #f0f4ff !important; }
.pdf-export-mode .rpt-verdict-hero h2 { color: #0a0d14 !important; }
.pdf-export-mode .rpt-stat-card { background: #f8f9fa !important; border: 1px solid #e0e0e0 !important; }
.pdf-export-mode .rpt-stat-val { color: #0a0d14 !important; }
.pdf-export-mode .rpt-section { background: #fff !important; border: 1px solid #e8e8e8 !important; }
.pdf-export-mode .rpt-section h3 { color: #0a0d14 !important; }
.pdf-export-mode .rpt-row { border-color: #eee !important; }
.pdf-export-mode .rpt-badge { background: #e8f4f8 !important; color: #0a6b7c !important; }
.pdf-export-mode .rpt-risk-high { color: #c0392b !important; }
.pdf-export-mode .rpt-risk-med { color: #e67e22 !important; }
.pdf-export-mode .rpt-cond-item { background: #fffbf0 !important; border-color: #f0d080 !important; }
.pdf-export-mode .rpt-kill-item { background: #fff0f0 !important; border-color: #f0a0a0 !important; }
.pdf-export-mode a { color: #0066cc !important; }
.pdf-export-mode .rpt-gov-btn { display: none !important; }
.pdf-export-mode .rpt-footer { background: #f8f9fa !important; }
.pdf-export-mode .rpt-footer * { color: #666 !important; }
/* ── Mobile responsive ─── */
@media(max-width:768px){
  .report{padding:20px 16px}
  .rpt-header{flex-direction:column;align-items:flex-start;gap:10px}
  .rpt-toolbar{gap:4px}
  .rpt-view-btn{font-size:9px;padding:4px 8px}
  .rpt-metrics{grid-template-columns:1fr 1fr;gap:8px}
  .rpt-m-val{font-size:18px}
  .g2,.g3{grid-template-columns:1fr}
  .rpt-v-word{font-size:22px}
  .rpt-tbl{font-size:11px}
  .rpt-tbl th,.rpt-tbl td{padding:5px 6px}
  .v-role{width:40px;font-size:9px}
  .v-stance{width:60px;font-size:8px}
  .rpt-audio,.rpt-doc{font-size:9px;padding:4px 8px}
}
@media(max-width:480px){
  .report{padding:12px 10px}
  .rpt-metrics{grid-template-columns:1fr 1fr}
  .rpt-m{padding:10px}
  .rpt-m-val{font-size:16px}
  .rpt-toolbar{flex-direction:column;align-items:stretch}
  .rpt-export-btn{margin-left:0}
}
</style>
</head>
<body>
<div class="report" id="report-root">
  <div class="rpt-loading" id="loading"><div class="rpt-spinner"></div>Loading decision data...</div>
</div>
<script>
(function(){
var params = new URLSearchParams(location.search);
var runId = params.get('run_id') || '';
var view  = params.get('view') || 'full';
var tier  = params.get('tier') || 'paid';

var VIEWS = {
  executive:  { label:'Executive Brief',  pages:['exec1','exec2'] },
  detailed:   { label:'Detailed Analysis', pages:['brief','command','risk','financials','room','handoff'] },
  governance: { label:'Board Governance',  pages:['gov_summary','gov_doc'] },
  full:       { label:'Full Report',       pages:['exec1','brief','command','risk','financials','room','handoff','gov_summary','gov_doc'] }
};

function has(page){ return (VIEWS[view]||VIEWS.full).pages.indexOf(page) !== -1; }
function gated(t){ return tier === 'free' && t === 'paid'; }
function esc(s){ var d=document.createElement('div');d.textContent=s||'';return d.innerHTML; }
function pct(v){ if(v==null)return '—';return (v>1?Math.round(v):Math.round(v*100))+'%'; }
function safe(v,fb){ return v!=null&&v!==''?v:(fb||'—'); }
function driveUrl(id){ if(!id)return '#'; if(typeof id==='object')return id.url||id.view_link||'#'; if(typeof id==='string')return id.startsWith('http')?id:'https://drive.google.com/file/d/'+id+'/view'; return '#'; }
function stanceColor(s){ if(!s)return 'var(--text-muted)';s=s.toUpperCase();if(s.includes('APPROVE')||s==='GO')return'var(--teal)';if(s.includes('REJECT')||s==='NO')return'var(--red)';if(s.includes('DEFER')||s==='NOT YET'||s.includes('CONDITIONAL')||s==='COND')return'var(--amber)';return'var(--blue)'; }
function stanceLabel(s){ if(!s)return'—';s=s.toUpperCase();if(s.includes('APPROVE_WITH'))return'CONDITIONAL';if(s.includes('APPROVE'))return'APPROVE';if(s.includes('REJECT'))return'REJECT';if(s==='DEFER'||s==='NOT YET')return'DEFER';return s; }

function gate(title){ return '<div class="rpt-gate"><h4>'+esc(title)+'</h4><p>Available with full analysis package</p><a href="#">Unlock Full Report</a></div>'; }

var apiUrl = '/api/data' + (runId ? '?run_id='+encodeURIComponent(runId) : '');
fetch(apiUrl).then(function(r){return r.json()}).then(render).catch(function(e){
  document.getElementById('loading').innerHTML='<div style="color:var(--red)">Failed: '+esc(e.message)+'</div>';
});

function render(raw){
  var ob=raw.outputBlob||{}, dash=ob.dashboard||{}, exec=ob.executive_summary||{}, dir=ob.direction_package||{};
  var bgp=ob.board_governance_packet||{}, fm=dash.financial_mechanics||{}, mso=ob.machine_strategy_object||{};
  var fo=raw.optionsBlob||{};
  var tl=ob.timeline_visualization||{}, gov=raw.govBlob||{}, stages=raw.stageOutputs||[];
  var dp=raw.dPacket||{}, dpCS=dp.confidence_summary||{}, dpOT=dp.option_tally||[], dpRPS=dp.role_packets_slim||[];
  var media = ob.media_assets||(raw.govBlob&&raw.govBlob.media_assets)||(raw.master&&raw.master.media_assets)||{};
  var docUrl = (raw.master&&raw.master.doc_url)||'';
  var docTitle = (raw.master&&raw.master.doc_title)||'';

  // Derived — build roles from stageOutputs, fall back to dPacket role_packets_slim or role_packets
  var maxRound = stages.reduce(function(mx,s){return Math.max(mx,s.round||0)},0)+1;
  var roles=[], roleSet={};
  stages.forEach(function(s){if(s.role_key&&!roleSet[s.role_key]){roleSet[s.role_key]=true;roles.push(s.role_key)}});
  // Fallback: extract roles from dPacket when stageOutputs is empty
  if(!roles.length&&dpRPS.length){dpRPS.forEach(function(r){var k=r.role_key||r.role||'';if(k&&!roleSet[k]){roleSet[k]=true;roles.push(k)}})}
  if(!roles.length&&dp.role_packets){Object.keys(dp.role_packets).forEach(function(k){if(!roleSet[k]){roleSet[k]=true;roles.push(k)}})}
  // Fallback: extract roles from dashboard role_assessment_preview
  if(!roles.length&&dash.role_assessment_preview){dash.role_assessment_preview.forEach(function(r){var k=r.role||r.role_key||'';if(k&&!roleSet[k]){roleSet[k]=true;roles.push(k)}})}
  var voteSplit=(bgp.elt_vote_outcome&&bgp.elt_vote_outcome.vote_split)||dash.vote_split||{};
  var voteKey=Object.keys(voteSplit)[0]||'';
  var optId=dash.approved_option_id||'', optName=dash.approved_option_label||optId;
  // Confidence: dashboard > dPacket confidence_summary > fallback 67
  var conf=dash.decision_confidence||(dpCS.avg||0.67)||67;
  var confPct=pct(conf);
  // Vote total: vote_split > dPacket option_tally > roles.length fallback
  var voteTotal=Object.values(voteSplit)[0]||0;
  if(!voteTotal&&dpOT.length){dpOT.forEach(function(t){if((t.vote_count||0)>voteTotal)voteTotal=t.vote_count})}
  if(!voteTotal)voteTotal=roles.length||7;

      if(sc.base_case||sc.bull_case||sc.bear_case){
        h+='<div class="rpt-card"><div class="rpt-card-h">Scenario Analysis</div><div class="rpt-card-b"><table class="rpt-tbl"><thead><tr><th>Scenario</th><th>Revenue</th><th>Assumption</th></tr></thead><tbody>';
        if(sc.bull_case)h+='<tr><td><span class="chip ch-green">Bull</span></td><td>'+esc(safe(sc.bull_revenue||(typeof sc.bull_case==='object'?sc.bull_case.revenue:'')))+'</td><td style="font-size:11px">'+esc(typeof sc.bull_case==='string'?sc.bull_case:(sc.bull_case.assumption||''))+'</td></tr>';
        if(sc.base_case)h+='<tr><td><span class="chip ch-blue">Base</span></td><td>'+esc(safe(sc.base_revenue||(typeof sc.base_case==='object'?sc.base_case.revenue:'')))+'</td><td style="font-size:11px">'+esc(typeof sc.base_case==='string'?sc.base_case:(sc.base_case.assumption||''))+'</td></tr>';
        if(sc.bear_case)h+='<tr><td><span class="chip ch-red">Bear</span></td><td>'+esc(safe(sc.bear_revenue||(typeof sc.bear_case==='object'?sc.bear_case.revenue:'')))+'</td><td style="font-size:11px">'+esc(typeof sc.bear_case==='string'?sc.bear_case:(sc.bear_case.assumption||''))+'</td></tr>';
        h+='</tbody></table></div></div>';
      }
    }
  }

  // ══════════════════════════════════════════════════════════════════════
  // DETAILED PAGE 5: The Room (Votes + Deliberation)
  // ══════════════════════════════════════════════════════════════════════
  if(has('room')){
    if(gated('paid')){h+=gate('The Room & Deliberation')}
    else{
      h+='<div class="page-break"></div><div class="page-label">The Room &mdash; Votes &amp; Deliberation</div>';
      // Final round votes
      h+='<div class="rpt-sec"><div class="rpt-sec-head"><div class="rpt-dot" style="background:var(--blue)"></div><div class="rpt-sec-title">Final Round Votes</div></div>';
      h+='<div class="rpt-card"><div class="rpt-card-b">';
      roles.forEach(function(role){
        var rv=roleVote(role,finalRound);
        var stance=rv.stance||'—';var cs=rv.conf||0;var cv=cs>1?cs:Math.round(cs*100);var sc=stanceColor(stance);
        h+='<div class="v-row"><div class="v-role">'+esc(role)+'</div><div class="v-track"><div class="v-fill" style="width:'+cv+'%;background:'+sc+'"></div></div><div class="v-stance" style="color:'+sc+'">'+stanceLabel(stance)+'</div><div class="v-conf">'+cv+'%</div></div>';
      });
      h+='</div></div></div>';
      // Convergence
      if(maxRound>1){
        h+='<div class="rpt-sec"><div class="rpt-sec-head"><div class="rpt-dot" style="background:var(--purple)"></div><div class="rpt-sec-title">Convergence Across Rounds</div></div>';
        h+='<div class="rpt-card"><div class="rpt-card-b"><table class="rpt-tbl"><thead><tr><th>Role</th>';
        for(var r=0;r<maxRound;r++)h+='<th>R'+r+'</th>';
        h+='</tr></thead><tbody>';
        roles.forEach(function(role){
          h+='<tr><td style="font-weight:600">'+esc(role)+'</td>';
          for(var r=0;r<maxRound;r++){
            var rv=roleVote(role,r);
            var stance=rv.stance||'—';var c=rv.conf||0;var cv=c>1?c:Math.round(c*100);
            h+='<td><span style="color:'+stanceColor(stance)+'">'+stanceLabel(stance)+'</span> <span style="color:var(--text-muted);font-size:10px">'+cv+'%</span></td>';
          }
          h+='</tr>';
        });
        h+='</tbody></table></div></div></div>';
      }
      // Groupthink
      var gt=dash.groupthink_flag||(raw.dPacket&&raw.dPacket.groupthink_flag)||{};
      if(gt&&gt.severity){
        h+='<div class="rpt-card"><div class="rpt-card-h">Groupthink Assessment</div><div class="rpt-card-b">';
        h+='<div class="rpt-item"><div class="rpt-icon ic-'+(gt.severity==='HIGH'?'red':gt.severity==='MEDIUM'?'amber':'teal')+'">!</div><div><strong>'+esc(gt.severity)+'</strong>'+(gt.explanation?' &mdash; <span style="font-size:12px;color:var(--text-secondary)">'+esc(gt.explanation)+'</span>':'')+'</div></div>';
        h+='</div></div>';
      }
    }
  }

  // ══════════════════════════════════════════════════════════════════════
  // DETAILED PAGE 6: Management Handoff
  // ══════════════════════════════════════════════════════════════════════
  if(has('handoff')){
    if(gated('paid')){h+=gate('Management Handoff')}
    else{
      h+='<div class="page-break"></div><div class="page-label">Management Handoff &mdash; Timeline &amp; Mandates</div>';
      var phases=tl.phases||[];var milestones=tl.milestones||dir.strategic_milestones||[];
      if(phases.length){
        h+='<div class="rpt-sec"><div class="rpt-sec-head"><div class="rpt-dot" style="background:var(--blue)"></div><div class="rpt-sec-title">Implementation Phases</div></div>';
        h+='<div class="rpt-card"><div class="rpt-card-b">';
        phases.forEach(function(p,i){var name=typeof p==='string'?p:(p.phase||p.name||'Phase '+(i+1));var desc=typeof p==='object'?(p.description||p.duration||''):'';
          h+='<div class="rpt-item"><div class="rpt-icon ic-blue">'+(i+1)+'</div><div><strong>'+esc(name)+'</strong>'+(desc?'<br><span style="font-size:11px;color:var(--text-secondary)">'+esc(desc)+'</span>':'')+'</div></div>'});
        h+='</div></div></div>';
      }
      if(milestones.length){
        h+='<div class="rpt-sec"><div class="rpt-sec-head"><div class="rpt-dot" style="background:var(--teal)"></div><div class="rpt-sec-title">Key Milestones</div></div>';
        h+='<div class="rpt-card"><div class="rpt-card-b">';
        milestones.forEach(function(m,i){var t=typeof m==='string'?m:((m.milestone||m.name||'')+(m.deadline?' &mdash; '+m.deadline:'')+(m.owner?' ('+m.owner+')':''));
          h+='<div class="rpt-item"><div class="rpt-icon ic-teal">'+(i+1)+'</div><div style="font-size:12px">'+esc(t)+'</div></div>'});
        h+='</div></div></div>';
      }
      if(conditions.length){
        h+='<div class="rpt-sec"><div class="rpt-sec-head"><div class="rpt-dot" style="background:var(--amber)"></div><div class="rpt-sec-title">Conditions to Track</div></div>';
        h+='<div class="rpt-card"><div class="rpt-card-b">';
        conditions.forEach(function(c,i){var t=typeof c==='string'?c:(c.condition||c.text||'');h+='<div class="rpt-item"><div class="rpt-icon ic-amber">'+(i+1)+'</div><div style="font-size:12px">'+esc(t)+'</div></div>'});
        h+='</div></div></div>';
      }
    }
  }

  // ══════════════════════════════════════════════════════════════════════
  // GOVERNANCE: Summary + Link to Full Google Doc
  // ══════════════════════════════════════════════════════════════════════
  if(has('gov_summary')){
    h+='<div class="page-break"></div><div class="page-label">Board Governance</div>';

    // Governance doc hero — link to Google Doc + PDF export
    if(docUrl){
      var docId='';
      var match=docUrl.match(/\/d\/([a-zA-Z0-9_-]+)/);
      if(match)docId=match[1];
      var pdfUrl=docId?'https://docs.google.com/document/d/'+docId+'/export?mimeType=application/pdf':'';
      h+='<div class="rpt-gov-hero">';
      h+='<h3>Full Governance Report</h3>';
      h+='<p>Detailed round-by-round analysis, per-role deliberation record, options evaluated, and audit appendix</p>';
      h+='<a class="rpt-gov-btn" href="'+esc(docUrl)+'" target="_blank">&#128196; Open Google Doc</a>';
      if(pdfUrl)h+='<a class="rpt-gov-btn rpt-gov-btn-pdf" href="'+esc(pdfUrl)+'" target="_blank">&#128196; Download as PDF</a>';
      h+='</div>';
    }

    // Board recommendation
    if(bgp.strategic_rationale){
      h+='<div class="rpt-sec"><div class="rpt-sec-head"><div class="rpt-dot" style="background:var(--blue)"></div><div class="rpt-sec-title">Board Recommendation</div></div>';
      h+='<div class="rpt-card"><div class="rpt-card-b"><p class="rpt-narrative">'+esc(bgp.strategic_rationale)+'</p></div></div></div>';
    }

    // Conditions for approval
    var condApp=bgp.conditions_for_approval||[];
    if(condApp.length){
      h+='<div class="rpt-sec"><div class="rpt-sec-head"><div class="rpt-dot" style="background:var(--amber)"></div><div class="rpt-sec-title">Conditions for Approval</div></div>';
      h+='<div class="rpt-card"><div class="rpt-card-b">';
      condApp.forEach(function(c,i){var t=typeof c==='string'?c:(c.condition||c.text||'');var owner=typeof c==='object'?(c.owner||c.role||''):'';
        h+='<div class="rpt-item"><div class="rpt-icon ic-amber">'+(i+1)+'</div><div>'+esc(t)+(owner?' <span style="color:var(--text-muted);font-size:10px">&mdash; '+esc(owner)+'</span>':'')+'</div></div>'});
      h+='</div></div></div>';
    }

    // Vote summary for board
    h+='<div class="rpt-sec"><div class="rpt-sec-head"><div class="rpt-dot" style="background:var(--blue)"></div><div class="rpt-sec-title">Vote Summary</div></div>';
    h+='<div class="rpt-card"><div class="rpt-card-b">';
    roles.forEach(function(role){
      var rv=roleVote(role,finalRound);
      var stance=rv.stance||'—';var cs=rv.conf||0;var cv=cs>1?cs:Math.round(cs*100);var sc=stanceColor(stance);
      h+='<div class="v-row"><div class="v-role">'+esc(role)+'</div><div class="v-track"><div class="v-fill" style="width:'+cv+'%;background:'+sc+'"></div></div><div class="v-stance" style="color:'+sc+'">'+stanceLabel(stance)+'</div><div class="v-conf">'+cv+'%</div></div>';
    });
    h+='</div></div></div>';

    // Governance framework
    if(bgp.governance_framework||bgp.reporting_cadence||bgp.escalation_triggers){
      h+='<div class="rpt-sec"><div class="rpt-sec-head"><div class="rpt-dot" style="background:var(--purple)"></div><div class="rpt-sec-title">Governance Framework</div></div>';
      h+='<div class="rpt-card"><div class="rpt-card-b">';
      if(bgp.reporting_cadence)h+='<div class="rpt-item"><div class="rpt-icon ic-blue">&#128197;</div><div><strong>Reporting:</strong> '+esc(typeof bgp.reporting_cadence==='string'?bgp.reporting_cadence:JSON.stringify(bgp.reporting_cadence))+'</div></div>';
      if(bgp.board_oversight)h+='<div class="rpt-item"><div class="rpt-icon ic-purple">&#128101;</div><div><strong>Board Oversight:</strong> '+esc(typeof bgp.board_oversight==='string'?bgp.board_oversight:JSON.stringify(bgp.board_oversight))+'</div></div>';
      var triggers=bgp.escalation_triggers;
      if(triggers){(Array.isArray(triggers)?triggers:[triggers]).forEach(function(t){var txt=typeof t==='string'?t:(t.trigger||t.text||JSON.stringify(t));h+='<div class="rpt-item"><div class="rpt-icon ic-red">&#9888;</div><div>'+esc(txt)+'</div></div>'})}
      h+='</div></div></div>';
    }
  }

  if(has('gov_doc')&&!docUrl){
    // If we expect gov_doc but no doc URL, show placeholder
    h+='<div class="rpt-gov-hero"><h3>Governance Report</h3><p>The full governance document will be available when the run completes through the GOV stage.</p></div>';
  }

  // ══════════════════════════════════════════════════════════════════════
  // FOOTER
  // ══════════════════════════════════════════════════════════════════════
  h+='<div class="rpt-footer"><div>Generated by StratOS Decision Engine</div><div>'+(runDate||new Date().toLocaleDateString())+'</div></div>';

  document.getElementById('report-root').innerHTML=h;
  var qShort=(question||'Decision').length>50?(question.slice(0,47)+'...'):question||'Decision';
  document.title='StratOS — '+viewLabel+' — '+qShort;
}

window.switchView=function(v){var u=new URL(location);u.searchParams.set('view',v);location=u.toString()};

window.exportPDF=function(){
  var el = document.getElementById('report-root');
  if (!el) { window.print(); return; }

  // Temporarily adjust styles for PDF — white background, dark text
  var toolbar = document.querySelector('.rpt-toolbar');
  if (toolbar) toolbar.style.display = 'none';
  var audioBar = el.querySelector('[style*="audio"]');
  if (audioBar) audioBar.style.display = 'none';

  // Add PDF-mode class for light styling
  el.classList.add('pdf-export-mode');

  var opt = {
    margin: [10, 10, 14, 10],
    filename: 'StratOS-Decision-Report-' + (runId || 'export') + '.pdf',
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: {
      scale: 2.5,
      useCORS: true,
      backgroundColor: '#ffffff',
      letterRendering: true
    },
    jsPDF: {
      unit: 'mm',
      format: 'a4',
      orientation: 'portrait'
    },
    pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
  };

  html2pdf().set(opt).from(el).save().then(function(){
    el.classList.remove('pdf-export-mode');
    if (toolbar) toolbar.style.display = '';
    if (audioBar) audioBar.style.display = '';
  });
};
})();
</script>
</body>
</html>
